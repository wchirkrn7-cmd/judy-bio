name: Bot Runner                  # ชื่อของโปรเจกต์ (ตั้งอะไรก็ได้)

on:
  push:
    branches: [ main ]            # สั่งให้รันทันทีที่เราอัปเดตโค้ดใหม่ขึ้น GitHub
  schedule:
    - cron: '0 */1 * * *'         # สั่งให้รันอัตโนมัติทุกๆ 1 ชั่วโมง (ปรับได้)
  workflow_dispatch:              # คำสั่งนี้จะทำให้เรามีปุ่ม "Run workflow" กดรันเองได้

jobs:
  build:
    runs-on: ubuntu-latest        # ใช้ระบบปฏิบัติการ Linux ของ GitHub ในการรัน

    steps:
      - name: Checkout code       # ขั้นตอนดึงโค้ดจากเครื่องเราไปที่เครื่อง GitHub
        uses: actions/checkout@v3

      - name: Set up Python       # ขั้นตอนติดตั้ง Python (เปลี่ยนเลขเวอร์ชันได้ตามต้องการ)
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies # ขั้นตอนติดตั้ง Library ต่างๆ ที่บอทต้องใช้
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Bot             # ขั้นตอนสั่งรันบอทจริงๆ
        env:
          # ถ้าบอทมี Token หรือ API Key ให้ดึงจาก Secrets มาใส่ตรงนี้
          MY_TOKEN: ${{ secrets.MY_TOKEN }} 
        run: python main.py        # เปลี่ยน main.py เป็นชื่อไฟล์หลักของคุณ
