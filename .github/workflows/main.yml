name: Run Python Bot

on:
  schedule:
    - cron: "*/11 * * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4   # อัปเดตเวอร์ชัน

      - name: Setup Python
        uses: actions/setup-python@v5   # อัปเดต (กัน warning Node.js)
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          TOKEN: ${{ secrets.TOKEN }}
        run: python main.py
